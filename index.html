<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="viewport" content="width=device-width", inital-scale="0.1">
    <title>Student Resoures Hub</title>
</head>

<body>

    <h1>Student Resources Hub</h1>

    <div id="app">
        <p id="status">Loading resources...</p>
        <ul id="resource-list"></ul>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/resources/resources/";

        const loadResources = async () => {
            try {
                const response = await fetch(API_URL)
                if (!response.ok) {
                    throw new Error (`HTTP error: ${response.status}`);  
                }

                const data = await response.json();
                console.log(data);
                
                const list = document.getElementById("resource-list");
                const status = document.getElementById("status");

                status.textContent = `${data.length} resources loaded.`;

                data.forEach(item => {
                    const li = document.createElement("li");
                    li.textContent = item.title;
                    list.appendChild(li);
                });

            } catch (error) {
                document.getElementById("status").textContent = "failed to loaded: " + error.message;
            }

            // let's dive in here...
        };
        loadResources();
    </script>

</body>
</html>
